<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minigolf Scorekort</title>
    
    <!-- App Ikoner med direkta länkar -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://github.com/Jokbt/Bangolf/blob/main/image_96b70a.PNG?raw=true">
    <link rel="icon" type="image/png" sizes="192x192" href="https://github.com/Jokbt/Bangolf/blob/main/image_96b70a.PNG?raw=true">
    
    <style>
        /* Hård låsning av bakgrunden */
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a242a;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Direktlänk till bakgrundsbilden */
            background-image: url('https://github.com/Jokbt/Bangolf/blob/main/image_96b70a.PNG?raw=true');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -1;
        }

        .wallet-container {
            position: relative;
            width: 100%; 
            height: 100%;
        }

        /* --- STENHÅRDA MINDRE MÅTT FÖR KORTEN --- */
        .card {
            position: absolute;
            /* Fasta mått som ryms på alla telefoner */
            width: 260px; 
            height: 440px; 
            /* Exakt centrering av kortet i mitten av skärmen */
            top: 50%;
            left: 50%;
            margin-top: -220px; 
            margin-left: -130px; 
            
            background: #2c3e50;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            
            transform-origin: center 130%; 
            transition: transform 0.4s ease, opacity 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        .card-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            transition: opacity 0.4s ease;
        }

        /* Inre vit ram */
        .card::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            pointer-events: none;
            z-index: 3;
        }

        /* --- SOLFJÄDER LÄGE --- */
        .wallet-container:not(.has-active) .card[data-index="1"] { transform: rotate(-12deg) translateY(15px); z-index: 1; }
        .wallet-container:not(.has-active) .card[data-index="2"] { transform: rotate(0deg) translateY(0); z-index: 2; }
        .wallet-container:not(.has-active) .card[data-index="3"] { transform: rotate(12deg) translateY(15px); z-index: 3; }

        /* --- AKTIVT KORT (Mitten) --- */
        .wallet-container.has-active .card.active {
            transform: rotate(0deg) translateY(-10px) scale(1.05);
            z-index: 20;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            cursor: default;
        }

        .wallet-container.has-active .card.active .card-img { opacity: 0.15; }
        
        .wallet-container.has-active .card:not(.active) {
            opacity: 0;
            transform: rotate(0deg) translateY(300px);
            pointer-events: none;
        }

        /* --- TYPOGRAFI & TEXT PÅ KORTET --- */
        .card-index, .card-title-center {
            position: absolute;
            z-index: 4;
            color: #ffffff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }
        
        .card-index {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 800;
            line-height: 1;
            font-size: 1.1rem;
        }

        .card-index.top-left { top: 12px; left: 12px; }
        .card-index.bottom-right { bottom: 12px; right: 12px; transform: rotate(180deg); }
        
        .card-title-center {
            width: 100%;
            text-align: center;
            left: 0;
            top: 20px; 
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
        }

        /* Färg när kortet öppnas */
        .wallet-container.has-active .card.active .card-index, 
        .wallet-container.has-active .card.active .card-title-center {
            color: #1f2937;
            text-shadow: none;
        }

        .suit { font-size: 1em; }

        /* Stäng-knapp */
        .close-btn {
            display: none;
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 20;
            color: #374151;
            align-items: center;
            justify-content: center;
        }
        .card.active .close-btn { display: flex; }

        /* Score-tabellen */
        .card-content {
            margin-top: 55px;
            margin-bottom: 50px;
            padding: 0 6px;
            overflow-y: auto;
            flex: 1;
            color: #1f2937;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
        }
        .card.active .card-content {
            opacity: 1;
            pointer-events: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem; 
            background: rgba(255, 255, 255, 0.9);
            border-radius: 6px;
        }
        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 2px;
            text-align: center;
        }
        th:first-child, td:first-child { width: 30px; font-weight: bold; }
        
        .player-input {
            width: 100%;
            border: none;
            background: transparent;
            font-weight: 700;
            text-align: center;
            font-size: 13px; 
            color: #374151;
            padding: 2px 0;
        }
        
        .score-input {
            width: 32px; 
            height: 32px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            background-color: #ffffff;
            color: #111827;
        }

        .total-row td {
            font-weight: 800;
            font-size: 1rem;
            padding: 8px 2px;
            border-bottom: 1px solid #e5e7eb;
        }

        /* Signaturer */
        .signature-row td { border-bottom: none; padding: 10px 5px; text-align: left; }
        .signature-line { display: flex; align-items: flex-end; gap: 5px; margin-bottom: 8px; }
        .signature-label { font-weight: 600; font-size: 0.8rem; }
        .signature-input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #9ca3af;
            background: transparent;
            font-family: 'Brush Script MT', 'Segoe Script', cursive; 
            font-size: 1.1rem;
            color: #1f2937;
            outline: none;
        }

        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="wallet-container" id="wallet-container">
    <!-- Korten genereras automatiskt med Javascript -->
</div>

<script>
    // --- LÖSNING PÅ "InvalidStateError" ---
    // Genom att lägga detta inuti 'load'-eventet förhindrar vi kraschen.
    window.addEventListener('load', function() {
        try {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                        console.log('Raderade gammal störande app-data.');
                    }
                }).catch(function(error) {
                    console.log('Kunde inte rensa service workers:', error);
                });
            }
        } catch (e) {
            console.log('Ogiltigt tillstånd för ServiceWorker fångades säkert.');
        }
    });

    const players = ["Spelare 1", "Spelare 2"];
    const numCourses = 3;
    const numHoles = 18;

    // DIREKTLÄNKAR TILL GITHUB (Bypass av alla sökvägsproblem)
    const cardImages = [
        "https://github.com/Jokbt/Bangolf/blob/main/image_9718e7.PNG?raw=true", 
        "https://github.com/Jokbt/Bangolf/blob/main/image_971888.PNG?raw=true", 
        "https://github.com/Jokbt/Bangolf/blob/main/image_97155f.PNG?raw=true"  
    ];

    const courseNames = [
        "Torekov Links",
        "Mellby Seaside",
        "Båstad Parkland"
    ];

    const walletContainer = document.getElementById('wallet-container');

    function activateCard(index, event) {
        const card = document.querySelector(`.card[data-index="${index}"]`);
        if (card.classList.contains('active')) return;

        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        walletContainer.classList.add('has-active');
    }

    function closeCards(event) {
        event.stopPropagation();
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        walletContainer.classList.remove('has-active');
    }

    function calculateTotal(courseIndex, playerIndex) {
        let total = 0;
        for (let hole = 1; hole <= numHoles; hole++) {
            const val = document.getElementById(`c${courseIndex}_p${playerIndex}_h${hole}`).value;
            if (val) total += parseInt(val);
        }
        document.getElementById(`total_c${courseIndex}_p${playerIndex}`).innerText = total;
    }

    function updatePlayerName(playerIndex, newName) {
        for (let c = 1; c <= numCourses; c++) {
            const input = document.getElementById(`name_c${c}_p${playerIndex}`);
            if (input && input.value !== newName) {
                input.value = newName;
            }
        }
    }

    for (let c = 1; c <= numCourses; c++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = c;
        card.onclick = (e) => activateCard(c, e);

        let tableHTML = `<table>
            <tr><th>Hål</th>`;
        
        players.forEach((p, pIndex) => {
            tableHTML += `<th>
                <input type="text" class="player-input" id="name_c${c}_p${pIndex}" value="${p}" 
                       oninput="updatePlayerName(${pIndex}, this.value)">
            </th>`;
        });
        tableHTML += `</tr>`;

        for (let h = 1; h <= numHoles; h++) {
            tableHTML += `<tr><td>${h}</td>`;
            players.forEach((p, pIndex) => {
                tableHTML += `<td>
                    <input type="number" class="score-input" id="c${c}_p${pIndex}_h${h}" min="1" max="7" 
                           oninput="calculateTotal(${c}, ${pIndex})">
                </td>`;
            });
            tableHTML += `</tr>`;
        }

        tableHTML += `<tr class="total-row"><td>S:a</td>`;
        players.forEach((p, pIndex) => {
            tableHTML += `<td id="total_c${c}_p${pIndex}">0</td>`;
        });
        
        tableHTML += `
            <tr class="signature-row">
                <td colspan="${players.length + 1}">
                    <div class="signature-line">
                        <span class="signature-label">Spelare:</span>
                        <input type="text" class="signature-input" placeholder="">
                    </div>
                    <div class="signature-line">
                        <span class="signature-label">Markör:</span>
                        <input type="text" class="signature-input" placeholder="">
                    </div>
                </td>
            </tr>
        </table>`;

        card.innerHTML = `
            <img class="card-img" src="${cardImages[c-1]}" alt="Bana ${c}" onerror="this.style.display='none'">
            
            <button class="close-btn" onclick="closeCards(event)" aria-label="Stäng">✕</button>
            
            <div class="card-index top-left">
                <span>${c}</span>
                <span class="suit">⛳</span>
            </div>
            
            <div class="card-title-center">${courseNames[c-1]}</div>
            
            <div class="card-index bottom-right">
                <span>${c}</span>
                <span class="suit">⛳</span>
            </div>

            <div class="card-content" onclick="event.stopPropagation()">
                ${tableHTML}
            </div>
        `;
        walletContainer.appendChild(card);
    }
</script>

</body>
</html>
