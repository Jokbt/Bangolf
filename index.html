<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <!-- Lade till viewport-fit=cover för att ta bort vita kanter på moderna mobiler -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minigolf Scorekort</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a242a">
    
    <!-- App Ikoner med direkta länkar -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://github.com/Jokbt/Bangolf/blob/main/image_96b70a.PNG?raw=true">
    <link rel="icon" type="image/png" sizes="192x192" href="https://github.com/Jokbt/Bangolf/blob/main/image_96b70a.PNG?raw=true">
    
    <style>
        /* Hård låsning av bakgrunden och fix för den vita linjen */
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; 
            height: 100vh;
            height: 100dvh; /* Dynamisk höjd täcker hela skärmen inkl. "safe areas" */
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a242a;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background-image: url('https://github.com/Jokbt/Bangolf/blob/main/image_96b70a.PNG?raw=true');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -1;
        }

        .wallet-container {
            position: relative;
            width: 100%; 
            height: 100%;
        }

        /* --- STENHÅRDA MINDRE MÅTT FÖR KORTEN --- */
        .card {
            position: absolute;
            width: 260px; 
            height: 500px; /* Minskad från 520px till 500px */
            top: 46%; /* Ändrad från 50% för att lyfta hela leken lite mer centriskt */
            left: 50%;
            margin-top: -250px; /* Justerad för att vara exakt hälften av 500px */
            margin-left: -130px; 
            
            background: #2c3e50;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            
            transform-origin: center 130%; 
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        z-index 0.4s, opacity 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        .card-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            transition: opacity 0.4s ease;
        }

        /* Inre vit ram */
        .card::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            pointer-events: none;
            z-index: 3;
        }

        /* --- SOLFJÄDER LÄGE --- */
        .wallet-container:not(.has-active) .card[data-index="1"]:not(.front) { transform: translate(-25px, 15px) rotate(-10deg) scale(0.8); z-index: 1; }
        .wallet-container:not(.has-active) .card[data-index="2"]:not(.front) { transform: translate(0, 5px) rotate(0deg) scale(0.8); z-index: 2; }
        .wallet-container:not(.has-active) .card[data-index="3"]:not(.front) { transform: translate(25px, 15px) rotate(10deg) scale(0.8); z-index: 3; }

        /* --- FOKUSERAT KORT (Ligger överst i solfjädern) --- */
        .wallet-container:not(.has-active) .card.front { 
            transform: translate(0, -15px) rotate(0deg) scale(1.1); /* Lyfte upp kortet 5px extra */
            z-index: 10; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }

        /* --- AKTIVT KORT (Scorekort öppet) --- */
        .wallet-container.has-active .card.active {
            transform: translate(0, -15px) scale(1.1); /* Lyfte upp scorekortet 5px extra */
            z-index: 20;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            cursor: default;
        }

        .wallet-container.has-active .card.active .card-img { opacity: 0.15; }
        
        .wallet-container.has-active .card:not(.active) {
            opacity: 0;
            transform: rotate(0deg) translateY(300px);
            pointer-events: none;
        }

        /* --- TYPOGRAFI & TEXT PÅ KORTET --- */
        .card-index, .card-title-center {
            position: absolute;
            z-index: 4;
            color: #ffffff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }
        
        .card-index {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 800;
            line-height: 1;
            font-size: 1.1rem;
        }

        .card-index.top-left { top: 12px; left: 12px; }
        .card-index.bottom-right { bottom: 12px; right: 12px; transform: rotate(180deg); }
        
        .card-title-center {
            width: 100%;
            text-align: center;
            left: 0;
            top: 20px; 
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .wallet-container.has-active .card.active .card-index, 
        .wallet-container.has-active .card.active .card-title-center {
            color: #1f2937;
            text-shadow: none;
        }

        .suit { font-size: 1em; }

        .close-btn {
            display: none;
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 20;
            color: #374151;
            align-items: center;
            justify-content: center;
        }
        .card.active .close-btn { display: flex; }

        /* Score-tabellen */
        .card-content {
            margin-top: 55px;
            margin-bottom: 50px;
            padding: 0 6px;
            overflow-y: auto;
            flex: 1;
            color: #1f2937;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
        }
        .card.active .card-content {
            opacity: 1;
            pointer-events: auto;
            transition-delay: 0.2s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem; 
            background: rgba(255, 255, 255, 0.9);
            border-radius: 6px;
        }
        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 2px;
            text-align: center;
        }
        th:first-child, td:first-child { width: 30px; font-weight: bold; }
        
        .player-input {
            width: 100%;
            border: none;
            background: transparent;
            font-weight: 700;
            text-align: center;
            font-size: 13px; 
            color: #374151;
            padding: 2px 0;
        }
        
        .score-input {
            width: 32px; 
            height: 32px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            background-color: #ffffff;
            color: #111827;
        }

        .total-row td {
            font-weight: 800;
            font-size: 1rem;
            padding: 8px 2px;
            border-bottom: 1px solid #e5e7eb;
        }

        .signature-row td { border-bottom: none; padding: 10px 5px; text-align: left; }
        .signature-line { display: flex; align-items: flex-end; gap: 5px; margin-bottom: 8px; }
        .signature-label { font-weight: 600; font-size: 0.8rem; }
        .signature-input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #9ca3af;
            background: transparent;
            font-family: 'Brush Script MT', 'Segoe Script', cursive; 
            font-size: 1.1rem;
            color: #1f2937;
            outline: none;
        }

        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="wallet-container" id="wallet-container">
    <!-- Korten genereras automatiskt med Javascript -->
</div>

<!-- Lade till Script som en modul för att hantera molndatabas och lokalt sparande säkert -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // PWA Registrering
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('Fel vid PWA registrering:', err));
        });
    }

    const numCourses = 3;
    const numHoles = 18;

    // Spelets minne - Här lagras allt du fyller i
    let gameState = {
        players: ["Spelare 1", "Spelare 2"],
        scores: {},
        signatures: {}
    };

    // 1. Firebase (Molnsparande ifall appen används inom Canvas-miljön)
    let db, auth, user;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'bangolf-pwa';

    if (typeof __firebase_config !== 'undefined') {
        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();

            onAuthStateChanged(auth, (u) => {
                if (u) {
                    user = u;
                    loadFromFirestore();
                }
            });
        } catch(e) { console.warn("Firebase Init Error", e); }
    }

    // 2. Offline Sparande (Laddar data via mobilens egen databas när appen är nedladdad från GitHub)
    loadFromIndexedDB((data) => {
        if (data) {
            gameState = data;
            applyGameState();
        }
    });

    // Applicerar all sparad data till webbsidan
    function applyGameState() {
        if (!gameState.signatures) gameState.signatures = {};

        gameState.players.forEach((name, p) => {
            for (let c = 1; c <= numCourses; c++) {
                const input = document.getElementById(`name_c${c}_p${p}`);
                if (input) input.value = name;
            }
        });

        for (let c = 1; c <= numCourses; c++) {
            for (let p = 0; p < 2; p++) {
                for (let h = 1; h <= numHoles; h++) {
                    const key = `c${c}_p${p}_h${h}`;
                    const el = document.getElementById(key);
                    if (el && gameState.scores[key] !== undefined) {
                        el.value = gameState.scores[key];
                    }
                }
                window.calculateTotal(c, p, false);
            }
        }

        for (const [key, val] of Object.entries(gameState.signatures)) {
            const el = document.getElementById(`sig_${key}`);
            if (el) el.value = val;
        }
    }

    // Sparfunktion (Körs automatiskt när du ändrar en siffra eller bokstav)
    let saveTimeout;
    function debounceSave() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            // Spara lokalt på telefonen (Offline-Stöd)
            saveToIndexedDB(gameState);

            // Spara i molnet (Om konfigurerat)
            if (user && db) {
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'gamedata', 'state');
                setDoc(docRef, gameState).catch(e => console.error("Molnsparande misslyckades", e));
            }
        }, 500);
    }

    // Hjälpfunktioner för telefonens lokala databas (IndexedDB)
    function saveToIndexedDB(data) {
        try {
            const req = indexedDB.open("BangolfDB", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("state");
            req.onsuccess = e => {
                const idb = e.target.result;
                if (idb.objectStoreNames.contains("state")) {
                    const tx = idb.transaction("state", "readwrite");
                    tx.objectStore("state").put(data, "gamestate");
                }
            };
        } catch(err) { console.warn("Lokal databas fel:", err); }
    }

    function loadFromIndexedDB(callback) {
        try {
            const req = indexedDB.open("BangolfDB", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("state");
            req.onsuccess = e => {
                const idb = e.target.result;
                if (!idb.objectStoreNames.contains("state")) return;
                const tx = idb.transaction("state", "readonly");
                const store = tx.objectStore("state");
                const getReq = store.get("gamestate");
                getReq.onsuccess = () => { if (getReq.result) callback(getReq.result); };
            };
        } catch(err) { console.warn("Lokal databas fel:", err); }
    }

    function loadFromFirestore() {
        if (!user || !db) return;
        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'gamedata', 'state');
        getDoc(docRef).then(docSnap => {
            if (docSnap.exists()) {
                gameState = docSnap.data();
                applyGameState();
                saveToIndexedDB(gameState); // Synkronisera ner till enheten
            }
        });
    }

    // ----- UI OCH INTERAKTIONER ----- //

    const cardImages = [
        "https://github.com/Jokbt/Bangolf/blob/main/image_9718e7.PNG?raw=true", 
        "https://github.com/Jokbt/Bangolf/blob/main/image_971888.PNG?raw=true", 
        "https://github.com/Jokbt/Bangolf/blob/main/image_97155f.PNG?raw=true"  
    ];

    const courseNames = ["MELLBY LINKS", "BÅSTAD PARKLAND", "MALEN SEASIDE"];
    const walletContainer = document.getElementById('wallet-container');

    document.addEventListener('click', function(e) {
        const clickedInsideCard = e.target.closest('.card');
        if (!clickedInsideCard) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active', 'front'));
            walletContainer.classList.remove('has-active');
        }
    });

    window.activateCard = function(index, event) {
        if (event) event.stopPropagation();
        const card = document.querySelector(`.card[data-index="${index}"]`);
        
        if (card.classList.contains('active')) return;

        if (!card.classList.contains('front')) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('front'));
            card.classList.add('front');
            return;
        }

        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        walletContainer.classList.add('has-active');
    };

    window.closeCards = function(event) {
        if (event) event.stopPropagation();
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        walletContainer.classList.remove('has-active');
    };

    // Updatera värden och Trigga Sparning
    window.updatePlayerName = function(playerIndex, newName, shouldSave = true) {
        gameState.players[playerIndex] = newName;
        for (let c = 1; c <= numCourses; c++) {
            const input = document.getElementById(`name_c${c}_p${playerIndex}`);
            if (input && input.value !== newName) input.value = newName;
        }
        if (shouldSave) debounceSave();
    };

    window.updateScore = function(c, p, h, val) {
        const key = `c${c}_p${p}_h${h}`;
        if (val) gameState.scores[key] = val;
        else delete gameState.scores[key];
        window.calculateTotal(c, p, true);
    };

    window.updateSignature = function(c, type, val) {
        gameState.signatures[`c${c}_${type}`] = val;
        debounceSave();
    };

    window.calculateTotal = function(courseIndex, playerIndex, shouldSave = true) {
        let total = 0;
        for (let hole = 1; hole <= numHoles; hole++) {
            const val = document.getElementById(`c${courseIndex}_p${playerIndex}_h${hole}`).value;
            if (val) total += parseInt(val);
        }
        document.getElementById(`total_c${courseIndex}_p${playerIndex}`).innerText = total;
        if (shouldSave) debounceSave();
    };

    // Bygg upp DOM (Generera scorekorten)
    for (let c = 1; c <= numCourses; c++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = c;
        if (c === 3) card.classList.add('front');
        card.onclick = (e) => window.activateCard(c, e);

        let tableHTML = `<table><tr><th>Hål</th>`;
        gameState.players.forEach((p, pIndex) => {
            tableHTML += `<th>
                <input type="text" class="player-input" id="name_c${c}_p${pIndex}" value="${p}" 
                       oninput="window.updatePlayerName(${pIndex}, this.value)">
            </th>`;
        });
        tableHTML += `</tr>`;

        for (let h = 1; h <= numHoles; h++) {
            tableHTML += `<tr><td>${h}</td>`;
            gameState.players.forEach((p, pIndex) => {
                tableHTML += `<td>
                    <input type="number" class="score-input" id="c${c}_p${pIndex}_h${h}" min="1" max="7" 
                           oninput="window.updateScore(${c}, ${pIndex}, ${h}, this.value)">
                </td>`;
            });
            tableHTML += `</tr>`;
        }

        tableHTML += `<tr class="total-row"><td>S:a</td>`;
        gameState.players.forEach((p, pIndex) => {
            tableHTML += `<td id="total_c${c}_p${pIndex}">0</td>`;
        });
        
        tableHTML += `
            <tr class="signature-row">
                <td colspan="${gameState.players.length + 1}">
                    <div class="signature-line">
                        <span class="signature-label">Spelare:</span>
                        <input type="text" class="signature-input" id="sig_c${c}_player" placeholder=""
                               oninput="window.updateSignature(${c}, 'player', this.value)">
                    </div>
                    <div class="signature-line">
                        <span class="signature-label">Markör:</span>
                        <input type="text" class="signature-input" id="sig_c${c}_marker" placeholder=""
                               oninput="window.updateSignature(${c}, 'marker', this.value)">
                    </div>
                </td>
            </tr>
        </table>`;

        card.innerHTML = `
            <img class="card-img" src="${cardImages[c-1]}" alt="Bana ${c}" onerror="this.style.display='none'">
            <button class="close-btn" onclick="window.closeCards(event)" aria-label="Stäng">✕</button>
            <div class="card-index top-left"><span>${c}</span><span class="suit">⛳</span></div>
            <div class="card-title-center">${courseNames[c-1]}</div>
            <div class="card-index bottom-right"><span>${c}</span><span class="suit">⛳</span></div>
            <div class="card-content" onclick="event.stopPropagation()">${tableHTML}</div>
        `;
        walletContainer.appendChild(card);
    }

    // --- SWIPE FUNKTION ---
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
    document.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, {passive: true});

    function handleSwipe() {
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) < 60) return;

        let currentCard = document.querySelector('.card.active');
        let isFullyOpen = true;

        if (!currentCard) {
            currentCard = document.querySelector('.card.front');
            isFullyOpen = false;
        }

        let currentIndex = currentCard ? parseInt(currentCard.getAttribute('data-index')) : 0;
        let nextIndex = currentIndex;

        if (diff > 0) nextIndex = currentCard ? (currentIndex % numCourses) + 1 : 1;
        else {
            nextIndex = currentCard ? currentIndex - 1 : numCourses;
            if (nextIndex < 1) nextIndex = numCourses;
        }

        const nextCard = document.querySelector(`.card[data-index="${nextIndex}"]`);
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active', 'front'));

        if (isFullyOpen && currentCard) {
            nextCard.classList.add('active');
            walletContainer.classList.add('has-active');
        } else {
            nextCard.classList.add('front');
            walletContainer.classList.remove('has-active');
        }
    }
</script>

</body>
</html>
